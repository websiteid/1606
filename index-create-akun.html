<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Zee App | Create Account</title>
    <link rel="icon" type="image/png" href="p3.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body, html {
            margin: 0; padding: 0; min-height: 100vh; width: 100%;
            font-family: 'Plus Jakarta Sans', sans-serif;
            user-select: none; background-color: #f3f4f6;
            overflow-x: hidden;
        }

        .full-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; object-fit: cover; }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(to bottom, rgba(255,255,255,0.2), rgba(0,0,0,0.7)); z-index: 2; }
        .font-love { font-family: 'Dancing Script', cursive; }

        .content-wrapper { position: relative; z-index: 10; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 40px 20px; }

        .glass-card {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.8);
            border-radius: 40px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.2);
            width: 100%;
            max-width: 420px;
            padding: 2.5rem 2rem;
            animation: cardAppear 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes cardAppear { 
            from { opacity: 0; transform: translateY(30px); } 
            to { opacity: 1; transform: translateY(0); } 
        }

        .input-error { border: 2px solid #ff4d6d !important; background: #fff1f2 !important; }
        
        input, select { 
            background: rgba(255, 255, 255, 0.9) !important; 
            border: 2px solid transparent !important;
            transition: all 0.3s ease;
        }
        input:focus, select:focus { border-color: #ff4d6d !important; outline: none; box-shadow: 0 0 15px rgba(255, 77, 109, 0.2); }

        .avatar-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-top: 10px; }
        .avatar-option {
            aspect-ratio: 1/1; border-radius: 15px; cursor: pointer; border: 3px solid white;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); background: white; padding: 4px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }
        .avatar-option.selected { border-color: #ff4d6d; transform: scale(1.1); box-shadow: 0 8px 20px rgba(255, 77, 109, 0.3); }

        /* Toast Notif Transparan */
        #customToast {
            position: fixed; top: -100px; left: 50%; transform: translateX(-50%);
            padding: 12px 24px; border-radius: 30px; 
            color: #1f2937;
            font-weight: 800;
            z-index: 1000; transition: all 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            display: flex; align-items: center; gap: 12px; min-width: 320px;
            background: rgba(255, 255, 255, 0.4); 
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        #customToast.show { top: 30px; }

        .btn-shine { background: linear-gradient(135deg, #ff4d6d 0%, #ff758c 100%); position: relative; overflow: hidden; }
        .btn-shine::after { content: ""; position: absolute; top: 0; left: -100%; width: 50%; height: 100%; background: linear-gradient(to right, transparent, rgba(255,255,255,0.4), transparent); transform: skewX(-25deg); animation: shine 4s infinite; }
        @keyframes shine { 0%, 20% { left: -100%; } 80%, 100% { left: 150%; } }

        .loading-spin { border: 3px solid rgba(255,255,255,0.3); border-radius: 50%; border-top: 3px solid #fff; width: 20px; height: 20px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <img src="p1.png" class="full-bg" alt="Background">
    <div class="overlay"></div>

    <div id="customToast">
        <div id="toastIconContainer" class="w-12 h-12 flex-shrink-0 flex items-center justify-center">
            <img id="toastImgIcon" src="" class="w-full h-full object-contain">
        </div>
        <span id="toastMsg"></span>
    </div>

    <div class="content-wrapper">
        <div class="glass-card">
            <img src="p2.png" alt="Logo" class="w-16 h-16 mx-auto mb-3 object-contain">
            <h1 class="text-4xl font-love text-gray-900 text-center">Zee App</h1>
            <p class="text-gray-700 font-bold mb-6 text-[10px] tracking-[0.4em] uppercase text-center">Buat Akun Rahasiamu ✨</p>

            <form id="registerForm" class="space-y-4">
                <div id="group-secretName">
                    <label class="text-[11px] font-extrabold ml-1 uppercase tracking-widest text-gray-800">Nama Rahasia</label>
                    <input type="text" id="secretName" placeholder="Contoh: Mystery Boy" class="w-full py-3 px-4 rounded-2xl mt-1 text-sm font-bold shadow-sm">
                </div>

                <div id="group-gender">
                    <label class="text-[11px] font-extrabold ml-1 uppercase tracking-widest text-gray-800">Gender</label>
                    <select id="gender" class="w-full py-3 px-4 rounded-2xl mt-1 text-sm font-bold cursor-pointer outline-none shadow-sm">
                        <option value="" disabled selected>Pilih Gender...</option>
                        <option value="Laki-laki">♂️ Laki-laki</option>
                        <option value="Perempuan">♀️ Perempuan</option>
                        <option value="Rahasia">📁 Rahasia 🤫</option>
                    </select>
                </div>

                <div id="group-avatar">
                    <label class="text-[11px] font-extrabold ml-1 uppercase tracking-widest text-gray-800">Pilih Avatar</label>
                    <div class="avatar-grid">
                        <img src="https://cdn-icons-png.flaticon.com/512/4825/4825112.png" class="avatar-option" onclick="selectAvatar(this)">
                        <img src="https://cdn-icons-png.flaticon.com/512/4825/4825082.png" class="avatar-option" onclick="selectAvatar(this)">
                        <img src="https://cdn-icons-png.flaticon.com/512/4825/4825027.png" class="avatar-option" onclick="selectAvatar(this)">
                        <img src="https://cdn-icons-png.flaticon.com/512/4825/4825051.png" class="avatar-option" onclick="selectAvatar(this)">
                        <img src="https://cdn-icons-png.flaticon.com/512/4825/4825062.png" class="avatar-option" onclick="selectAvatar(this)">
                        <img src="https://cdn-icons-png.flaticon.com/512/4825/4825015.png" class="avatar-option" onclick="selectAvatar(this)">
                        <img src="https://cdn-icons-png.flaticon.com/512/4825/4825087.png" class="avatar-option" onclick="selectAvatar(this)">
                        <img src="https://cdn-icons-png.flaticon.com/512/4825/4825038.png" class="avatar-option" onclick="selectAvatar(this)">
                    </div>
                </div>

                <div id="group-username">
                    <label class="text-[11px] font-extrabold ml-1 uppercase tracking-widest text-gray-800">Username</label>
                    <input type="text" id="username" placeholder="username123" class="w-full py-3 px-4 rounded-2xl mt-1 text-sm font-bold shadow-sm">
                </div>

                <div class="relative" id="group-password">
                    <label class="text-[11px] font-extrabold ml-1 uppercase tracking-widest text-gray-800">Password</label>
                    <input type="password" id="password" placeholder="••••••••" class="w-full py-3 px-4 rounded-2xl mt-1 text-sm font-bold shadow-sm">
                    <button type="button" onclick="togglePass()" class="absolute right-4 top-9 text-lg">
                        <span id="eyeIcon">👁️</span>
                    </button>
                </div>

                <button type="submit" id="btnSubmit" class="btn-shine w-full py-4 mt-2 rounded-2xl text-white font-black text-sm tracking-widest uppercase flex items-center justify-center gap-3 transition-transform active:scale-95 shadow-xl">
                    <span id="btnText">CREATE ACCOUNT 🚀</span>
                    <div id="loader" class="loading-spin hidden"></div>
                </button>
            </form>

            <div class="text-center">
                <a href="index.html" class="inline-block mt-6 text-gray-500 text-[10px] font-bold uppercase tracking-widest hover:text-pink-600 transition-colors">
                    ← Back to Home
                </a>
            </div>
        </div>
    </div>

    <script>
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxgjnwAhbw36eoo41AoY-EhWsjysnVgS-gvhZnvaA-pD1hYe7JYIYaKPNMO-h1-QbaQ/exec';
        let selectedAvatarData = "";

        function showToast(msg, type = 'error') {
            const toast = document.getElementById('customToast');
            const iconImg = document.getElementById('toastImgIcon');
            const text = document.getElementById('toastMsg');
            
            text.innerText = msg;
            iconImg.classList.add('animate__animated', 'animate__bounceIn');

            if(type === 'error') {
                // Ikon Warning
                iconImg.src = "https://cdn-icons-png.flaticon.com/512/8044/8044598.png";
                toast.style.border = '2px solid rgba(239, 68, 68, 0.5)';
            } else {
                // Ikon Sukses (Permintaan Baru)
                iconImg.src = "https://cdn-icons-png.flaticon.com/512/6808/6808197.png";
                toast.style.border = '2px solid rgba(16, 185, 129, 0.5)';
            }

            toast.classList.add('show');
            setTimeout(() => {
                toast.classList.remove('show');
                iconImg.classList.remove('animate__animated', 'animate__bounceIn');
            }, 3000);
        }

        function selectAvatar(element) {
            document.querySelectorAll('.avatar-option').forEach(img => img.classList.remove('selected'));
            element.classList.add('selected');
            selectedAvatarData = element.src;
        }

        function togglePass() {
            const passInput = document.getElementById('password');
            const eye = document.getElementById('eyeIcon');
            passInput.type = passInput.type === "password" ? "text" : "password";
            eye.innerText = passInput.type === "password" ? "👁️" : "🔒";
        }

        function shakeField(groupId) {
            const el = document.getElementById(groupId);
            el.classList.add('animate__animated', 'animate__headShake');
            const input = el.querySelector('input, select');
            if(input) input.classList.add('input-error');
            setTimeout(() => el.classList.remove('animate__animated', 'animate__headShake'), 500);
        }

        document.getElementById('registerForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const secretName = document.getElementById('secretName').value.trim();
            const gender = document.getElementById('gender').value;
            const username = document.getElementById('username').value.trim().toLowerCase();
            const password = document.getElementById('password').value;

            document.querySelectorAll('input, select').forEach(el => el.classList.remove('input-error'));

            let isValid = true;
            if (!secretName) { shakeField('group-secretName'); isValid = false; }
            if (!gender) { shakeField('group-gender'); isValid = false; }
            if (!username) { shakeField('group-username'); isValid = false; }
            if (!password) { shakeField('group-password'); isValid = false; }
            if (!selectedAvatarData) { shakeField('group-avatar'); isValid = false; }

            if (!isValid) {
                showToast("Lengkapi semua kolom ya!");
                return;
            }

            const btn = document.getElementById('btnSubmit');
            const btnText = document.getElementById('btnText');
            const loader = document.getElementById('loader');

            btn.disabled = true;
            btnText.innerText = "CHECKING...";
            loader.classList.remove('hidden');

            try {
                const response = await fetch(SCRIPT_URL, {
                    method: 'POST',
                    body: JSON.stringify({
                        action: 'register',
                        secretName: secretName,
                        gender: gender,
                        username: username,
                        password: password,
                        avatar: selectedAvatarData
                    })
                });
                
                const result = await response.json();

                if (result.status === 'success') {
                    showToast('Akun Berhasil Dibuat!', 'success');
                    setTimeout(() => window.location.href = 'index-login.html', 2000);
                } else {
                    showToast(result.message, 'error');
                    shakeField('group-username');
                    btn.disabled = false;
                    btnText.innerText = "CREATE ACCOUNT 🚀";
                    loader.classList.add('hidden');
                }
            } catch (error) {
                showToast("Server sedang sibuk, coba lagi nanti!");
                btn.disabled = false;
                btnText.innerText = "CREATE ACCOUNT 🚀";
                loader.classList.add('hidden');
            }
        });
    </script>
</body>
</html>
