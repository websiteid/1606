<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Zee App | Cari Pasangan</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body, html { 
            height: 100vh; 
            width: 100%; 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: #f3f4f6; 
        }

        /* Biarkan body bisa scroll tapi sembunyikan scrollbar agar estetik */
        body { overflow-y: auto; scroll-behavior: smooth; }
        body::-webkit-scrollbar { display: none; }

        .full-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; object-fit: cover; }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(to bottom, rgba(255,255,255,0.1), rgba(0,0,0,0.7)); z-index: 2; }

        .app-layout {
            position: relative;
            width: 90%;
            max-width: 400px; 
            margin: 0 auto; 
            padding: 100px 0 120px; /* Ruang untuk notif atas & nav bawah */
            z-index: 10;
        }

        /* HEADER & BACK */
        .header-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; color: white; }
        .btn-back { background: rgba(255,255,255,0.2); backdrop-filter: blur(10px); padding: 8px 15px; border-radius: 12px; font-size: 12px; font-weight: bold; }

        /* GLASS CARD FORM */
        .glass-card {
            width: 100%;
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(20px);
            border-radius: 30px;
            padding: 1.5rem;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            margin-bottom: 20px;
        }

        .input-group { margin-bottom: 1rem; }
        .input-label { font-size: 10px; font-weight: 800; text-transform: uppercase; color: #4b5563; margin-bottom: 5px; display: block; }
        .glass-input { width: 100%; background: white; border: 1px solid #e5e7eb; border-radius: 12px; padding: 10px; font-size: 14px; outline: none; }

        /* FOTO HANDLER */
        .photo-box { position: relative; width: 100%; height: 200px; background: #eee; border-radius: 20px; overflow: hidden; border: 2px dashed #ff4d6d; }
        #preview-img { width: 100%; height: 100%; object-fit: cover; display: none; }
        .btn-delete-photo { position: absolute; top: 10px; right: 10px; background: rgba(255,0,0,0.7); color: white; padding: 5px 10px; border-radius: 10px; font-size: 10px; display: none; }

        /* DATING CARD SYSTEM */
        #search-result { display: none; margin-top: 20px; }
        .dating-card {
            position: relative;
            width: 100%;
            height: 450px;
            border-radius: 25px;
            overflow: hidden;
            box-shadow: 0 15px 30px rgba(0,0,0,0.3);
        }
        .dating-img { width: 100%; height: 100%; object-fit: cover; }
        .dating-info {
            position: absolute; bottom: 0; left: 0; width: 100%;
            padding: 20px; background: linear-gradient(to top, rgba(0,0,0,0.9), transparent);
            color: white;
        }
        .action-buttons { display: flex; justify-content: center; gap: 20px; margin-top: 20px; }
        .btn-action { width: 60px; height: 60px; border-radius: 50%; display: flex; align-items: center; justify-content: center; background: white; box-shadow: 0 5px 15px rgba(0,0,0,0.1); transition: 0.3s; }
        .btn-action:active { transform: scale(0.8); }

        /* NOTIF CUSTOM */
        #custom-notif {
            position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
            width: 85%; max-width: 380px; z-index: 1000;
            background: rgba(255,255,255,0.9); backdrop-filter: blur(10px);
            padding: 15px; border-radius: 20px; display: flex; align-items: center; gap: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2); visibility: hidden;
        }

        /* NAVBAR FIXED */
        .nav-bottom {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            width: 90%; max-width: 400px; height: 70px;
            display: flex; justify-content: space-evenly; align-items: center;
            background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(15px);
            border-radius: 20px; z-index: 100; box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        .nav-icon { width: 25px; transition: 0.3s; }
        .nav-item:hover .nav-icon { transform: scale(1.6) translateY(-5px); }

        .font-love { font-family: 'Dancing Script', cursive; }
    </style>
</head>

<body>

    <img src="p1.png" class="full-bg">
    <div class="overlay"></div>

    <!-- NOTIFIKASI DYNAMIC -->
    <div id="custom-notif" class="animate__animated">
        <img id="notif-icon" src="" style="width: 45px;">
        <div id="notif-message" style="font-size: 12px; font-weight: 800; color: #374151;"></div>
    </div>

    <div class="app-layout">
        
        <div class="header-top">
            <button class="btn-back" onclick="location.href='dashboard.html'">← Back</button>
            <h2 class="font-love text-2xl">Zee Match</h2>
            <div style="width: 50px;"></div>
        </div>

        <!-- FORM INPUT PROFIL -->
        <div id="form-container" class="glass-card animate__animated animate__fadeIn">
            <h1 class="text-xl font-bold mb-4">Lengkapi Profilmu</h1>
            
            <div class="input-group">
                <label class="input-label">Nama</label>
                <input type="text" id="user-name" class="glass-input" placeholder="Nama panggilanmu">
            </div>

            <div class="input-group">
                <label class="input-label">Bio / Keterangan</label>
                <textarea id="user-bio" class="glass-input" rows="3" placeholder="Ceritakan tentang dirimu..."></textarea>
            </div>

            <div class="input-group">
                <label class="input-label">Foto Kamu</label>
                <div class="photo-box" onclick="document.getElementById('file-input').click()">
                    <div id="ph-text" class="absolute inset-0 flex flex-col items-center justify-center text-gray-400">
                        <span class="text-3xl">+</span>
                        <span class="text-[10px] font-bold">Upload Foto</span>
                    </div>
                    <img id="preview-img">
                    <button class="btn-delete-photo" id="btn-del" onclick="removePhoto(event)">Hapus Foto</button>
                    <input type="file" id="file-input" hidden accept="image/*" onchange="previewFile(this)">
                </div>
            </div>

            <div class="flex flex-col gap-2">
                <button onclick="saveProfile()" id="save-btn" class="w-full bg-blue-600 text-white py-3 rounded-xl font-bold text-sm">Simpan Profil</button>
                <div id="edit-actions" class="hidden flex gap-2">
                    <button onclick="deleteProfile()" class="flex-1 bg-gray-200 text-red-600 py-3 rounded-xl font-bold text-sm">Hapus Profil</button>
                    <button onclick="startSearch()" class="flex-[2] bg-gradient-to-r from-pink-500 to-rose-400 text-white py-3 rounded-xl font-bold text-sm shadow-lg">Start Cari Pasangan 🚀</button>
                </div>
            </div>
        </div>

        <!-- HASIL CARI PASANGAN (DATING APP STYLE) -->
        <div id="search-result" class="animate__animated animate__fadeInUp">
            <div class="dating-card">
                <img src="https://images.unsplash.com/photo-1517841905240-472988babdf9" class="dating-img">
                <div class="dating-info">
                    <h2 class="text-2xl font-bold">Zeline, 21</h2>
                    <p class="text-sm opacity-80">Suka muncak dan ngopi sore-sore. Cari yang frekuensi.</p>
                </div>
            </div>

            <div class="action-buttons">
                <button class="btn-action" onclick="showNotif('Gak suka ya? Oke cari lain!', 'https://cdn-icons-png.flaticon.com/512/9849/9849304.png')">
                    <img src="https://cdn-icons-png.flaticon.com/512/9849/9849304.png" style="width:30px;">
                </button>
                <button class="btn-action" onclick="showNotif('Ciee.. Kamu nge-like dia! 💕', 'https://cdn-icons-png.flaticon.com/512/456/456115.png')">
                    <img src="https://cdn-icons-png.flaticon.com/512/456/456115.png" style="width:30px;">
                </button>
            </div>
            
            <button onclick="resetPage()" class="w-full mt-8 text-white text-xs font-bold underline opacity-60">Kembali Edit Profil</button>
        </div>

    </div>

    <!-- NAVBAR (IDENTIK) -->
    <nav class="nav-bottom">
        <a href="cari.html" class="nav-item active"><img src="https://cdn-icons-png.flaticon.com/512/954/954591.png" class="nav-icon"></a>
        <a href="pesan.html" class="nav-item"><img src="https://cdn-icons-png.flaticon.com/512/668/668287.png" class="nav-icon"></a>
        <a href="game.html" class="nav-item"><img src="https://cdn-icons-png.flaticon.com/512/808/808476.png" class="nav-icon"></a>
        <a href="profil.html" class="nav-item"><img src="https://cdn-icons-png.flaticon.com/512/9187/9187604.png" class="nav-icon"></a>
    </nav>

    <script>
        // 1. VALIDASI LOGIN SAMA DENGAN SEBELUMNYA
        const secretName = localStorage.getItem('userSecretName');
        if (!secretName) {
            showNotif("Login dulu ya!", "https://cdn-icons-png.flaticon.com/256/13049/13049666.png");
            setTimeout(() => { window.location.href = 'index.html'; }, 3000);
        }

        // 2. FUNGSI NOTIF CUSTOM
        function showNotif(msg, icon) {
            const notif = document.getElementById('custom-notif');
            document.getElementById('notif-message').innerText = msg;
            document.getElementById('notif-icon').src = icon;
            notif.style.visibility = 'visible';
            notif.classList.add('animate__fadeInDown');
            setTimeout(() => {
                notif.classList.replace('animate__fadeInDown', 'animate__fadeOutUp');
                setTimeout(() => { notif.style.visibility = 'hidden'; notif.classList.remove('animate__fadeOutUp'); }, 500);
            }, 3000);
        }

        // 3. HANDLER FOTO
        function previewFile(input) {
            const preview = document.getElementById('preview-img');
            const delBtn = document.getElementById('btn-del');
            const ph = document.getElementById('ph-text');
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    preview.src = e.target.result;
                    preview.style.display = 'block';
                    delBtn.style.display = 'block';
                    ph.style.display = 'none';
                }
                reader.readAsDataURL(input.files[0]);
            }
        }

        function removePhoto(e) {
            e.stopPropagation();
            document.getElementById('preview-img').style.display = 'none';
            document.getElementById('btn-del').style.display = 'none';
            document.getElementById('ph-text').style.display = 'flex';
            document.getElementById('file-input').value = "";
        }

        // 4. CRUD PROFIL
        function saveProfile() {
            const name = document.getElementById('user-name').value;
            const bio = document.getElementById('user-bio').value;
            if(!name || !bio) {
                showNotif("Isi data kamu dulu!", "https://cdn-icons-png.flaticon.com/256/13049/13049666.png");
                return;
            }
            showNotif("Profil Berhasil Disimpan!", "https://cdn-icons-png.flaticon.com/512/14895/14895910.png");
            document.getElementById('save-btn').classList.add('hidden');
            document.getElementById('edit-actions').classList.remove('hidden');
        }

        function deleteProfile() {
            if(confirm("Hapus profil ini?")) {
                document.getElementById('user-name').value = "";
                document.getElementById('user-bio').value = "";
                removePhoto(new Event('click'));
                document.getElementById('save-btn').classList.remove('hidden');
                document.getElementById('edit-actions').classList.add('hidden');
                showNotif("Profil dihapus!", "https://cdn-icons-png.flaticon.com/256/13049/13049666.png");
            }
        }

        // 5. SEARCHING PASANGAN
        function startSearch() {
            showNotif("Mencari Pasangan...", "https://cdn-icons-png.flaticon.com/512/7216/7216586.png");
            setTimeout(() => {
                document.getElementById('form-container').classList.add('hidden');
                document.getElementById('search-result').style.display = 'block';
                window.scrollTo(0,0);
            }, 2000);
        }

        function resetPage() {
            document.getElementById('form-container').classList.remove('hidden');
            document.getElementById('search-result').style.display = 'none';
        }
    </script>
</body>
</html>
