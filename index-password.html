<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Zee App | Reset Password</title>
    <link rel="icon" type="image/png" href="p3.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body, html {
            margin: 0; padding: 0; min-height: 100vh; width: 100%;
            font-family: 'Plus Jakarta Sans', sans-serif;
            user-select: none; background-color: #f3f4f6;
            overflow-x: hidden;
        }

        .full-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; object-fit: cover; }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(to bottom, rgba(255,255,255,0.2), rgba(0,0,0,0.7)); z-index: 2; }
        .font-love { font-family: 'Dancing Script', cursive; }

        .content-wrapper { position: relative; z-index: 10; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 40px 20px; }

        .glass-card {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.8);
            border-radius: 40px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.2);
            width: 100%;
            max-width: 420px;
            padding: 2.5rem 2rem;
            animation: cardAppear 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            text-align: center;
        }

        @keyframes cardAppear { 
            from { opacity: 0; transform: translateY(30px); } 
            to { opacity: 1; transform: translateY(0); } 
        }

        .btn-telegram {
            background: linear-gradient(135deg, #0088cc 0%, #24a1de 100%);
            box-shadow: 0 10px 20px rgba(0, 136, 204, 0.3);
            transition: all 0.3s ease;
        }
        
        .btn-telegram:active { transform: scale(0.95); }

        .sticker-bounce {
            animation: bounce 2s infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
    </style>
</head>
<body>

    <img src="p1.png" class="full-bg" alt="Background">
    <div class="overlay"></div>

    <div class="content-wrapper">
        <div class="glass-card">
            <!-- Sticker Telegram -->
            <img src="https://cdn-icons-png.flaticon.com/512/8409/8409145.png" alt="Telegram Sticker" class="w-24 h-24 mx-auto mb-4 sticker-bounce">
            
            <h1 class="text-3xl font-love text-gray-900">Forgot Password?</h1>
            <p class="text-gray-600 font-bold mt-2 mb-6 text-[11px] tracking-widest uppercase px-4">
                Jangan panik! Hubungi Admin untuk memulihkan akunmu secara manual.
            </p>

            <div class="bg-white/50 rounded-3xl p-5 mb-6 border border-white">
                <p class="text-[10px] font-extrabold text-gray-400 uppercase tracking-tighter mb-2">Instruksi</p>
                <p class="text-sm font-semibold text-gray-700 leading-relaxed">
                    Klik tombol di bawah untuk mengirim pesan otomatis ke Admin via Telegram.
                </p>
            </div>

            <!-- Tombol Telegram -->
            <button onclick="contactAdmin()" class="btn-telegram w-full py-4 rounded-2xl text-white font-black text-sm tracking-widest uppercase flex items-center justify-center gap-3 shadow-xl">
                <span>Contact Admin @jnizo</span>
                <svg width="20" height="20" viewBox="0 0 24 24" fill="white"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm4.64 6.8c-.15 1.58-.8 5.42-1.13 7.19-.14.75-.42 1-.68 1.03-.58.05-1.02-.38-1.58-.75-.88-.58-1.38-.94-2.23-1.5-.99-.65-.35-1.01.22-1.59.15-.15 2.71-2.48 2.76-2.69.01-.03.01-.14-.07-.2-.08-.06-.19-.04-.27-.02-.11.02-1.93 1.23-5.46 3.62-.51.35-.98.52-1.4.51-.46-.01-1.35-.26-2.01-.48-.81-.27-1.45-.42-1.39-.88.03-.24.37-.48 1.02-.73 4-1.74 6.67-2.88 8.01-3.43 3.81-1.56 4.6-1.83 5.12-1.84.11 0 .37.03.54.17.14.12.18.28.2.45-.02.07-.02.13-.03.19z"/></svg>
            </button>

            <div class="text-center mt-8">
                <a href="index-login.html" class="inline-block text-gray-500 text-[10px] font-bold uppercase tracking-widest hover:text-pink-600 transition-colors">
                    ← Back to Login
                </a>
            </div>
        </div>
    </div>

    <script>
        function contactAdmin() {
            const username = "@jnizo";
            
            // Format Pesan Auto yang Rapi
            const message = encodeURIComponent(
                "✨ *RESET PASSWORD REQUEST - ZEE APP* ✨\n\n" +
                "Halo Admin " + username + ",\n" +
                "Saya lupa password akun Zee App saya. Mohon bantuannya untuk proses pemulihan.\n\n" +
                "👤 *Username:* [Sebutkan Username Kamu]\n" +
                "🔑 *Nama Rahasia:* [Sebutkan Nama Rahasia]\n\n" +
                "Terima kasih! 🙏"
            );

            // Redirect ke Telegram
            window.location.href = `https://t.me/jnizo?text=${message}`;
        }
    </script>
</body>
</html>
