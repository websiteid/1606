<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Zee Bot | Help Desk</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&family=Poppins:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-pink: #ff4d6d;
            --secondary-pink: #ff758c;
            --glass-bg: rgba(255, 255, 255, 0.15);
            --glass-border: rgba(255, 255, 255, 0.2);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { 
            height: 100%; 
            width: 100%; 
            margin: 0; 
            padding: 0; 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: #000; 
            overflow: hidden; 
        }
        
        /* Latar Belakang */
        .full-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; object-fit: cover; }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(to bottom, rgba(0,0,0,0.3), rgba(0,0,0,0.8)); z-index: 2; }
        
        /* Layout Utama Menggunakan Dynamic Viewport Height */
        .app-layout {
            position: relative;
            width: 90%;
            max-width: 400px; 
            height: 100dvh; /* Menggunakan dvh agar akurat di browser HP */
            margin: 0 auto; 
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            padding: 20px 0 15px; /* Kurangi padding atas bawah sedikit */
            z-index: 10;
        }

        /* Card Chat Fleksibel */
        .chat-card { 
            width: 100%;
            flex: 1; /* Biarkan dia mengisi ruang yang tersedia */
            min-height: 0; /* Penting untuk flex item agar bisa mengecil jika perlu */
            background: var(--glass-bg); 
            backdrop-filter: blur(25px); 
            -webkit-backdrop-filter: blur(25px); 
            border: 1px solid var(--glass-border); 
            border-radius: 30px; 
            display: flex; 
            flex-direction: column; 
            overflow: hidden; 
            box-shadow: 0 25px 50px rgba(0,0,0,0.3); 
            margin-bottom: 12px;
        }

        #chat-container { 
            flex: 1; 
            overflow-y: auto; 
            padding: 15px; 
            scrollbar-width: none; 
            scroll-behavior: smooth; 
        }
        #chat-container::-webkit-scrollbar { display: none; }
        
        .bubble { max-width: 85%; padding: 10px 14px; border-radius: 18px; font-size: 12px; line-height: 1.5; margin-bottom: 12px; }
        .bot-msg { display: flex; align-items: flex-start; gap: 8px; }
        .bot-avatar { width: 30px; height: 30px; border-radius: 50%; background: white; padding: 2px; }
        .bot-bubble { background: #fff; color: #111; border-bottom-left-radius: 4px; }
        .user-bubble { background: #007aff; color: white; margin-left: auto; border-bottom-right-radius: 4px; }
        
        .swipe-hint { display: flex; align-items: center; gap: 5px; color: rgba(255, 255, 255, 0.6); font-size: 10px; font-weight: 700; text-transform: uppercase; margin-bottom: 6px; }
        
        .question-wrapper { 
            width: 100%; 
            overflow-x: auto; 
            display: flex; 
            gap: 10px; 
            padding: 2px 0 10px; 
            scrollbar-width: none; 
        }
        .question-wrapper::-webkit-scrollbar { display: none; }
        
        .q-chip { flex-shrink: 0; background: rgba(255, 255, 255, 0.15); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.2); color: white; padding: 8px 16px; border-radius: 50px; font-size: 11px; font-weight: 600; white-space: nowrap; transition: 0.3s; }
        .q-chip:active { transform: scale(0.95); background: #fff; color: #000; }

        /* Navbar Tetap Aman di Bagian Bawah */
        .nav-bottom { 
            width: 100%; 
            max-width: 380px;
            height: 65px; 
            display: flex; 
            justify-content: space-around; 
            align-items: center; 
            background: rgba(255, 255, 255, 0.9); 
            backdrop-filter: blur(15px); 
            -webkit-backdrop-filter: blur(15px); 
            border-radius: 20px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.3); 
            padding: 0 5px; 
            border: 1px solid rgba(255,255,255,0.5); 
            flex-shrink: 0; /* Mencegah navbar mengecil */
        }

        .nav-item { 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
            padding: 10px;
        }

        .nav-icon { 
            width: 24px; 
            height: 24px; 
            filter: drop-shadow(0 2px 3px rgba(0,0,0,0.1));
        }

        .nav-item:active { 
            transform: scale(1.3) translateY(-5px); 
        }
        
        .typing { font-size: 10px; color: #fff; opacity: 0.8; margin: 0 0 15px 40px; display: none; }
    </style>
</head>
<body>
    <img src="p1.png" class="full-bg" alt="Latar Belakang">
    <div class="overlay"></div>

    <div class="app-layout">
        <!-- Header Bot -->
        <div class="w-full flex items-center gap-3 mb-3 mt-1 animate__animated animate__fadeIn">
            <div class="w-10 h-10 bg-white rounded-full p-1 shadow-xl">
                <img src="https://cdn-icons-png.flaticon.com/512/8995/8995840.png" class="w-full h-full" alt="Bot">
            </div>
            <div>
                <h1 class="text-white font-extrabold text-lg tracking-tight leading-none">Zee Bot</h1>
                <p class="text-green-400 text-[9px] uppercase font-black tracking-widest">● Live Support</p>
            </div>
        </div>

        <!-- Chat Area (Fleksibel mengecil di HP pendek) -->
        <div class="chat-card animate__animated animate__zoomIn">
            <div id="chat-container">
                <div class="bot-msg animate__animated animate__fadeInLeft">
                    <img src="https://cdn-icons-png.flaticon.com/512/8995/8995840.png" class="bot-avatar" alt="Avatar">
                    <div class="bubble bot-bubble">Halo! Aku <b>Zee Bot</b>. 🦊<br>Ada yang bisa aku bantu? Pilih di bawah!</div>
                </div>
                <div id="typing-indicator" class="typing">Mengetik...</div>
            </div>
        </div>

        <!-- Suggestion Section -->
        <div class="w-full">
            <div class="swipe-hint animate__animated animate__pulse animate__infinite">
                <span>Geser untuk lainnya</span>
                <svg width="10" height="10" fill="currentColor" viewBox="0 0 256 256"><path d="M221.66,133.66l-72,72a8,8,0,0,1-11.32-11.32L196.69,136H40a8,8,0,0,1,0-16H196.69L138.34,61.66a8,8,0,0,1,11.32-11.32l72,72A8,8,0,0,1,221.66,133.66Z"></path></svg>
            </div>
            <div class="question-wrapper">
                <button onclick="askBot('Apa itu Zee App?', 'Zee App adalah asisten digital keren untuk menata hidupmu!')" class="q-chip">Apa itu Zee App?</button>
                <button onclick="askBot('Ganti Profil?', 'Klik ikon profil di bawah, lalu pilih menu Edit Profil.')" class="q-chip">Ganti Profil?</button>
                <button onclick="askBot('Main Game?', 'Klik ikon Controller di navigasi bawah untuk mulai!')" class="q-chip">Main Game?</button>
                <button onclick="askBot('Lapor Bug?', 'Kirim detail kendalamu di menu pesan agar kami cek.')" class="q-chip">Lapor Bug?</button>
                <button onclick="askBot('Premium?', 'Fitur premium sedang disiapkan khusus buat kamu!')" class="q-chip">Premium?</button>
            </div>
        </div>

        <!-- Navbar (Tetap di dalam viewport) -->
        <nav class="nav-bottom animate__animated animate__fadeInUp">
            <a href="dashboard.html" class="nav-item">
                <img src="https://cdn-icons-png.flaticon.com/512/7648/7648203.png" class="nav-icon" alt="Home">
            </a>
            <a href="cari.html" class="nav-item">
                <img src="https://cdn-icons-png.flaticon.com/512/954/954591.png" class="nav-icon" alt="Search">
            </a>
            <a href="pesan.html" class="nav-item">
                <img src="https://cdn-icons-png.flaticon.com/512/668/668287.png" class="nav-icon" alt="Message">
            </a>
            <a href="game.html" class="nav-item">
                <img src="https://cdn-icons-png.flaticon.com/512/808/808476.png" class="nav-icon" alt="Game">
            </a>
            <a href="helpdesk.html" class="nav-item">
                <img src="https://cdn-icons-png.flaticon.com/512/8662/8662591.png" class="nav-icon" alt="Help">
            </a>
            <a href="profil.html" class="nav-item">
                <img src="https://cdn-icons-png.flaticon.com/512/9187/9187604.png" class="nav-icon" alt="Profile">
            </a>
        </nav>
    </div>

    <script>
        function askBot(q, a) {
            const container = document.getElementById('chat-container');
            const typing = document.getElementById('typing-indicator');
            
            const userMsg = document.createElement('div');
            userMsg.className = 'bubble user-bubble animate__animated animate__fadeInRight';
            userMsg.innerText = q;
            container.appendChild(userMsg);
            
            container.scrollTop = container.scrollHeight;
            typing.style.display = 'block';
            container.scrollTop = container.scrollHeight;

            setTimeout(() => {
                typing.style.display = 'none';
                const botMsg = document.createElement('div');
                botMsg.className = 'bot-msg animate__animated animate__fadeInLeft';
                botMsg.innerHTML = `<img src="https://cdn-icons-png.flaticon.com/512/8995/8995840.png" class="bot-avatar"><div class="bubble bot-bubble">${a}</div>`;
                container.appendChild(botMsg);
                container.scrollTop = container.scrollHeight;
            }, 800);
        }
    </script>
</body>
</html>
