<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Zee Bot | Help Desk</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&family=Poppins:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { height: 100vh; width: 100%; margin: 0; padding: 0; font-family: 'Plus Jakarta Sans', sans-serif; background-color: #000; overflow: hidden; }
        
        .full-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; object-fit: cover; }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(to bottom, rgba(0,0,0,0.3), rgba(0,0,0,0.8)); z-index: 2; }
        
        .main-layout { 
            position: relative; 
            z-index: 10; 
            display: flex; 
            flex-direction: column; 
            height: 100vh; 
            width: 100%; 
            max-width: 400px; /* Samakan dengan max-width dashboard */
            margin: 0 auto; 
            padding: 20px 15px 30px; 
        }

        .chat-card { 
            flex: 1; 
            background: rgba(255, 255, 255, 0.1); 
            backdrop-filter: blur(25px); 
            -webkit-backdrop-filter: blur(25px); 
            border: 1px solid rgba(255, 255, 255, 0.2); 
            border-radius: 35px; /* Samakan rounded-nya */
            display: flex; 
            flex-direction: column; 
            overflow: hidden; 
            box-shadow: 0 25px 50px rgba(0,0,0,0.3); 
            margin-bottom: 15px; 
        }

        #chat-container { flex: 1; overflow-y: auto; padding: 20px; scrollbar-width: none; scroll-behavior: smooth; }
        #chat-container::-webkit-scrollbar { display: none; }
        
        .bubble { max-width: 85%; padding: 12px 16px; border-radius: 20px; font-size: 13px; line-height: 1.5; margin-bottom: 15px; }
        .bot-msg { display: flex; align-items: flex-start; gap: 10px; }
        .bot-avatar { width: 35px; height: 35px; border-radius: 50%; background: white; padding: 2px; }
        .bot-bubble { background: #fff; color: #111; border-bottom-left-radius: 4px; }
        .user-bubble { background: #007aff; color: white; margin-left: auto; border-bottom-right-radius: 4px; }
        
        .swipe-hint { display: flex; align-items: center; gap: 5px; color: rgba(255, 255, 255, 0.6); font-size: 10px; font-weight: 700; text-transform: uppercase; margin-bottom: 8px; margin-left: 5px; }
        
        .question-wrapper { 
            width: 100%; 
            overflow-x: auto; 
            display: flex; 
            gap: 10px; 
            padding: 5px 0 15px; 
            scrollbar-width: none; 
        }
        .question-wrapper::-webkit-scrollbar { display: none; }
        
        .q-chip { flex-shrink: 0; background: rgba(255, 255, 255, 0.15); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.2); color: white; padding: 10px 18px; border-radius: 50px; font-size: 12px; font-weight: 600; white-space: nowrap; transition: 0.3s; }
        .q-chip:active { transform: scale(0.95); background: #fff; color: #000; }

        /* Navbar Identik dengan Dashboard.html */
        .nav-bottom { 
            width: 100%; 
            max-width: 380px;
            height: 70px; /* Samakan tinggi */
            display: flex; 
            justify-content: space-around; 
            align-items: center; 
            background: rgba(255, 255, 255, 0.9); 
            backdrop-filter: blur(15px); 
            -webkit-backdrop-filter: blur(15px); 
            border-radius: 25px; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.3); 
            padding: 0 10px; 
            border: 1px solid rgba(255,255,255,0.5); 
            margin: 0 auto;
        }

        .nav-item { 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
            padding: 10px;
        }

        .nav-icon { 
            width: 26px; /* Samakan ukuran icon */
            height: 26px; 
            filter: drop-shadow(0 2px 3px rgba(0,0,0,0.1));
        }

        .nav-item:hover { 
            transform: scale(1.4) translateY(-8px); 
        }
        
        .typing { font-size: 11px; color: #fff; opacity: 0.8; margin: 0 0 15px 45px; display: none; }
    </style>
</head>
<body>
    <img src="p1.png" class="full-bg">
    <div class="overlay"></div>

    <div class="main-layout">
        <!-- Header -->
        <div class="flex items-center gap-3 mb-4 mt-2 animate__animated animate__fadeIn">
            <div class="w-12 h-12 bg-white rounded-full p-1 shadow-xl">
                <img src="https://cdn-icons-png.flaticon.com/512/8995/8995840.png" class="w-full h-full">
            </div>
            <div>
                <h1 class="text-white font-extrabold text-xl tracking-tight">Zee Bot</h1>
                <p class="text-green-400 text-[10px] uppercase font-black tracking-widest">● Live Support</p>
            </div>
        </div>

        <!-- Chat Area -->
        <div class="chat-card animate__animated animate__zoomIn">
            <div id="chat-container">
                <div class="bot-msg animate__animated animate__fadeInLeft">
                    <img src="https://cdn-icons-png.flaticon.com/512/8995/8995840.png" class="bot-avatar">
                    <div class="bubble bot-bubble">Halo! Aku <b>Zee Bot</b>. 🦊<br>Ada yang bisa aku bantu? Pilih di bawah!</div>
                </div>
                <div id="typing-indicator" class="typing">Mengetik...</div>
            </div>
        </div>

        <!-- Suggestion Section -->
        <div>
            <div class="swipe-hint animate__animated animate__pulse animate__infinite">
                <span>Geser untuk lainnya</span>
                <svg width="12" height="12" fill="currentColor" viewBox="0 0 256 256"><path d="M221.66,133.66l-72,72a8,8,0,0,1-11.32-11.32L196.69,136H40a8,8,0,0,1,0-16H196.69L138.34,61.66a8,8,0,0,1,11.32-11.32l72,72A8,8,0,0,1,221.66,133.66Z"></path></svg>
            </div>
            <div class="question-wrapper">
                <button onclick="askBot('Apa itu Zee App?', 'Zee App adalah asisten digital keren untuk menata hidupmu!')" class="q-chip">Apa itu Zee App?</button>
                <button onclick="askBot('Ganti Profil?', 'Klik ikon profil di bawah, lalu pilih menu Edit Profil.')" class="q-chip">Ganti Profil?</button>
                <button onclick="askBot('Main Game?', 'Klik ikon Controller di navigasi bawah untuk mulai!')" class="q-chip">Main Game?</button>
                <button onclick="askBot('Lapor Bug?', 'Kirim detail kendalamu di menu pesan agar kami cek.')" class="q-chip">Lapor Bug?</button>
                <button onclick="askBot('Premium?', 'Fitur premium sedang disiapkan khusus buat kamu!')" class="q-chip">Premium?</button>
            </div>
        </div>

        <!-- Navbar (Identik dengan Dashboard) -->
        <nav class="nav-bottom animate__animated animate__fadeInUp">
            <a href="dashboard.html" class="nav-item">
                <img src="https://cdn-icons-png.flaticon.com/512/7648/7648203.png" class="nav-icon" alt="Home">
            </a>
            <a href="cari.html" class="nav-item">
                <img src="https://cdn-icons-png.flaticon.com/512/954/954591.png" class="nav-icon" alt="Search">
            </a>
            <a href="pesan.html" class="nav-item">
                <img src="https://cdn-icons-png.flaticon.com/512/668/668287.png" class="nav-icon" alt="Message">
            </a>
            <a href="game.html" class="nav-item">
                <img src="https://cdn-icons-png.flaticon.com/512/808/808476.png" class="nav-icon" alt="Game">
            </a>
            <a href="helpdesk.html" class="nav-item">
                <img src="https://cdn-icons-png.flaticon.com/512/8662/8662591.png" class="nav-icon" alt="Help">
            </a>
            <a href="profil.html" class="nav-item">
                <img src="https://cdn-icons-png.flaticon.com/512/9187/9187604.png" class="nav-icon" alt="Profile">
            </a>
        </nav>
    </div>

    <script>
        function askBot(q, a) {
            const container = document.getElementById('chat-container');
            const typing = document.getElementById('typing-indicator');
            
            const userMsg = document.createElement('div');
            userMsg.className = 'bubble user-bubble animate__animated animate__fadeInRight';
            userMsg.innerText = q;
            container.appendChild(userMsg);
            
            container.scrollTop = container.scrollHeight;
            typing.style.display = 'block';
            container.scrollTop = container.scrollHeight;

            setTimeout(() => {
                typing.style.display = 'none';
                const botMsg = document.createElement('div');
                botMsg.className = 'bot-msg animate__animated animate__fadeInLeft';
                botMsg.innerHTML = `<img src="https://cdn-icons-png.flaticon.com/512/8995/8995840.png" class="bot-avatar"><div class="bubble bot-bubble">${a}</div>`;
                container.appendChild(botMsg);
                container.scrollTop = container.scrollHeight;
            }, 800);
        }
    </script>
</body>
</html>
