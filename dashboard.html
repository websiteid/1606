<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Zee App | Dashboard Premium</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&family=Poppins:wght@400;600;700;900&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary-pink: #ff4d6d;
            --secondary-pink: #ff758c;
            --glass-bg: rgba(255, 255, 255, 0.6);
            --glass-border: rgba(255, 255, 255, 0.6);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body, html {
            height: 100vh;
            width: 100%;
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #f3f4f6;
            overflow: hidden; 
        }

        /* Latar Belakang */
        .full-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            object-fit: cover;
            background: #e5e7eb;
        }

        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(to bottom, rgba(255,255,255,0.1), rgba(0,0,0,0.7));
            z-index: 2;
        }

        /* Tata Letak Utama */
        .app-layout {
            position: relative;
            width: 90%;
            max-width: 400px; 
            height: 100vh;
            margin: 0 auto; 
            display: flex;
            flex-direction: column;
            justify-content: space-between; /* Membuat konten tersebar */
            align-items: center;
            padding: 40px 0 30px; /* Memberi ruang atas dan bawah */
            z-index: 10;
        }

        /* Notifikasi */
        #login-notif {
            position: absolute;
            top: 20px;
            width: 100%;
            z-index: 9999;
            background: rgba(255, 255, 255, 0.3);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.4);
            padding: 15px 20px;
            border-radius: 25px;
            display: flex;
            align-items: center;
            gap: 12px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.25);
            visibility: hidden;
        }

        .stiker-bear {
            width: 45px;
            height: 45px;
            flex-shrink: 0;
        }

        /* Card Dashboard */
        .glass-card-premium {
            width: 100%;
            background: var(--glass-bg);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border-radius: 35px;
            padding: 3rem 1.5rem 2.5rem;
            text-align: center;
            border: 1px solid var(--glass-border);
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25);
            margin-top: auto; /* Mendorong ke tengah */
            margin-bottom: 20px;
            position: relative;
            overflow: hidden;
        }

        .glass-card-premium::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255,255,255,0.3) 0%, rgba(255,255,255,0) 70%);
            transform: rotate(30deg);
            pointer-events: none;
        }

        /* Profil Avatar */
        .avatar-container {
            width: 110px;
            height: 110px;
            margin: 0 auto 1.5rem;
            border-radius: 50%;
            padding: 6px;
            background: linear-gradient(135deg, var(--primary-pink), #fac1d1, var(--secondary-pink));
            background-size: 200% 200%;
            animation: gradientBorder 4s ease infinite;
            position: relative;
            box-shadow: 0 10px 20px rgba(255, 77, 109, 0.3);
        }

        .avatar-img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid white;
            background: white;
        }

        /* Tipografi */
        .welcome-sub {
            font-family: 'Poppins', sans-serif;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.35em;
            background: linear-gradient(135deg, #6b7280, #374151);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.25rem;
        }

        .moving-name {
            font-family: 'Poppins', sans-serif;
            font-weight: 900;
            font-size: 2.5rem;
            line-height: 1.1;
            margin-bottom: 1rem;
            background: linear-gradient(to right, #ff4d6d, #ff758c, #4f46e5, #ff758c, #ff4d6d);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shine 3s linear infinite, pulseSlow 2s ease-in-out infinite;
        }

        /* Navigasi Lurus di Tengah (Tidak Fixed ke Bawah Layar) */
        .nav-bottom {
            width: 100%;
            max-width: 380px;
            height: 70px;
            display: flex;
            justify-content: space-around;
            align-items: center;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-radius: 25px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.3);
            padding: 0 10px;
            border: 1px solid rgba(255,255,255,0.5);
            margin-bottom: auto; /* Menjaga jarak dari bawah agar tetap di area konten */
        }

        .nav-item {
            display: flex;
            justify-content: center;
            align-items: center;
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            padding: 10px;
        }

        .nav-icon {
            width: 26px;
            height: 26px;
            filter: drop-shadow(0 2px 3px rgba(0,0,0,0.1));
        }

        .nav-item:hover {
            transform: scale(1.4) translateY(-8px);
        }

        /* Sistem Stiker */
        #sticker-container {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 5;
            overflow: hidden;
        }

        .spam-sticker {
            position: absolute;
            bottom: -100px;
            opacity: 0;
            will-change: transform, opacity;
            animation: floatUpParty 4s linear forwards;
        }

        /* Keyframes */
        @keyframes shine { to { background-position: 200% center; } }
        @keyframes pulseSlow { 
            0%, 100% { transform: scale(1); } 
            50% { transform: scale(1.03); } 
        }
        @keyframes gradientBorder {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        @keyframes floatUpParty {
            0% { transform: translateY(0) rotate(0deg); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(-120vh) rotate(360deg); opacity: 0; }
        }

        .btn-premium {
            background: linear-gradient(135deg, #111827 0%, #374151 100%);
            color: white;
            text-transform: uppercase;
            font-size: 11px;
            font-weight: 800;
            letter-spacing: 0.2em;
            padding: 14px 35px;
            border-radius: 50px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.15);
            transition: all 0.3s ease;
            margin-top: 1.5rem;
        }

        .btn-premium:hover {
            transform: translateY(-2px);
            background: linear-gradient(135deg, var(--primary-pink) 0%, var(--secondary-pink) 100%);
        }
    </style>
</head>

<body>
    <img src="p1.png" class="full-bg" alt="Background">
    <div class="overlay"></div>

    <div id="sticker-container"></div>

    <div class="app-layout">
        <!-- Notifikasi Login -->
        <div id="login-notif" class="animate__animated">
            <img src="https://cdn-icons-png.flaticon.com/512/7871/7871500.png" class="stiker-bear" alt="Icon">
            <div class="notif-text">
                Ups! Akses ditolak. <br>Kamu harus login dulu di Zee App ya.. ✨
            </div>
        </div>

        <!-- Dashboard Card -->
        <main class="glass-card-premium animate__animated animate__zoomIn">
            <div class="avatar-container">
                <img id="userAvatar" src="https://cdn-icons-png.flaticon.com/512/1144/1144760.png" class="avatar-img" alt="User">
            </div>

            <p class="welcome-sub">Welcome Back ✨</p>
            <h1 class="moving-name" id="displayName">Zee User</h1>

            <p class="welcome-desc text-gray-600 text-sm font-semibold leading-relaxed px-4">
                Senang melihatmu kembali. <br>Yuk, jelajahi aktivitas serumu hari ini!
            </p>

            <button class="btn-premium">Explore Now</button>
        </main>

        <!-- Navbar (Tetap di dalam App Layout agar menyesuaikan layar HP) -->
        <nav class="nav-bottom animate__animated animate__fadeInUp animate__delay-1s">
            <a href="dashboard.html" class="nav-item">
                <img src="https://cdn-icons-png.flaticon.com/512/7648/7648203.png" class="nav-icon" alt="Home">
            </a>
            <a href="cari.html" class="nav-item">
                <img src="https://cdn-icons-png.flaticon.com/512/954/954591.png" class="nav-icon" alt="Search">
            </a>
            <a href="pesan.html" class="nav-item">
                <img src="https://cdn-icons-png.flaticon.com/512/668/668287.png" class="nav-icon" alt="Message">
            </a>
            <a href="game.html" class="nav-item">
                <img src="https://cdn-icons-png.flaticon.com/512/808/808476.png" class="nav-icon" alt="Game">
            </a>
            <a href="helpdesk.html" class="nav-item">
                <img src="https://cdn-icons-png.flaticon.com/512/8662/8662591.png" class="nav-icon" alt="Help">
            </a>
            <a href="profil.html" class="nav-item">
                <img src="https://cdn-icons-png.flaticon.com/512/9187/9187604.png" class="nav-icon" alt="Profile">
            </a>
        </nav>
    </div>

    <script>
        (function() {
            const config = {
                stickerInterval: 400,
                notifDuration: 5000,
                stickers: [
                    'https://cdn-icons-png.flaticon.com/512/10174/10174277.png',
                    'https://cdn-icons-png.flaticon.com/512/6782/6782784.png',
                    'https://cdn-icons-png.flaticon.com/512/11171/11171133.png',
                    'https://cdn-icons-png.flaticon.com/512/4360/4360005.png',
                    'https://cdn-icons-png.flaticon.com/512/6782/6782726.png',
                    'https://cdn-icons-png.flaticon.com/512/6782/6782720.png',
                    'https://cdn-icons-png.flaticon.com/512/8143/8143884.png',
                    'https://cdn-icons-png.flaticon.com/512/9553/9553174.png',
                    'https://cdn-icons-png.flaticon.com/512/7024/7024195.png'
                ]
            };

            const getStorage = (key) => {
                const val = localStorage.getItem(key);
                return (val === "undefined" || val === "null" || !val) ? null : val;
            };

            const secretName = getStorage('userSecretName');
            const avatarUrl = getStorage('userAvatar');
            const notif = document.getElementById('login-notif');
            const container = document.getElementById('sticker-container');

            if (!secretName) {
                window.onload = () => {
                    notif.style.visibility = 'visible';
                    notif.classList.add('animate__fadeInDown'); 

                    setTimeout(() => {
                        notif.classList.replace('animate__fadeInDown', 'animate__fadeOutUp');
                        setTimeout(() => window.location.href = 'index.html', 800);
                    }, config.notifDuration);
                };
                return;
            }

            document.addEventListener("DOMContentLoaded", () => {
                document.getElementById('displayName').innerText = secretName;
                if (avatarUrl) {
                    document.getElementById('userAvatar').src = avatarUrl;
                }
                setInterval(spawnSticker, config.stickerInterval);
            });

            function spawnSticker() {
                if (!container) return;

                const img = document.createElement('img');
                const size = Math.random() * 15 + 35;
                const duration = Math.random() * 2 + 4;
                
                img.src = config.stickers[Math.floor(Math.random() * config.stickers.length)];
                img.className = 'spam-sticker';
                
                Object.assign(img.style, {
                    left: `${Math.random() * 90}%`,
                    width: `${size}px`,
                    animationDuration: `${duration}s`
                });

                container.appendChild(img);
                setTimeout(() => img.remove(), duration * 1000);
            }
        })();
    </script>
</body>
</html>
