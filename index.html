<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Zee App</title>
    <link rel="icon" type="image/png" href="p3.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Plus+Jakarta+Sans:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            overflow: hidden;
            font-family: 'Plus Jakarta Sans', sans-serif;
            user-select: none;
        }

        .full-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
            object-fit: cover;
        }

        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(to bottom, rgba(0,0,0,0.1), rgba(0,0,0,0.5));
            z-index: -1;
        }

        .font-love { font-family: 'Dancing Script', cursive; }

        .glass-card {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 40px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.3);
            width: 90%;
            max-width: 380px;
            padding: 3rem 2rem;
            text-align: center;
            opacity: 0;
            transform: translateY(20px);
            animation: cardAppear 0.8s ease-out forwards;
        }

        @keyframes cardAppear {
            to { opacity: 1; transform: translateY(0); }
        }

        .reveal {
            opacity: 0;
            transform: translateY(15px);
            animation: fadeInUp 0.6s ease forwards;
        }

        @keyframes fadeInUp {
            to { opacity: 1; transform: translateY(0); }
        }

        .delay-1 { animation-delay: 0.3s; }
        .delay-2 { animation-delay: 0.5s; }
        .delay-3 { animation-delay: 0.7s; }
        .delay-4 { animation-delay: 0.9s; }

        .static-logo {
            width: 100px;
            height: 100px;
            object-fit: contain;
            filter: drop-shadow(0 5px 15px rgba(0,0,0,0.2));
        }

        .btn-shine {
            background: linear-gradient(135deg, #ff4d6d 0%, #ff758c 100%);
            position: relative;
            overflow: hidden;
            box-shadow: 0 10px 20px rgba(255, 77, 109, 0.3);
        }

        .btn-shine::after {
            content: "";
            position: absolute;
            top: 0;
            left: -100%;
            width: 50%;
            height: 100%;
            background: linear-gradient(to right, transparent, rgba(255,255,255,0.4), transparent);
            transform: skewX(-25deg);
            animation: shine 4s infinite;
        }

        @keyframes shine {
            0%, 20% { left: -100%; }
            80%, 100% { left: 150%; }
        }

        .btn-interact {
            transition: all 0.3s ease;
        }

        .btn-interact:hover {
            transform: scale(1.02);
            filter: brightness(1.1);
        }

        .btn-interact:active {
            transform: scale(0.98);
        }

        .btn-icon {
            width: 24px;
            height: 24px;
            margin-left: 10px;
        }

        .credit-text {
            position: absolute;
            bottom: 20px;
            font-size: 10px;
            color: rgba(255, 255, 255, 0.6);
            letter-spacing: 2px;
            text-transform: uppercase;
            font-weight: 800;
        }

        #infoModal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(10px);
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: opacity 0.4s ease;
        }

        .modal-content {
            background: white;
            padding: 2.5rem;
            border-radius: 35px;
            max-width: 320px;
            text-align: center;
            animation: modalIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
        }

        @keyframes modalIn {
            0% { opacity: 0; transform: scale(0.9); }
            100% { opacity: 1; transform: scale(1); }
        }
    </style>
</head>
<body class="flex flex-col items-center justify-center h-full">

    <div id="infoModal">
        <div class="modal-content">
            <img src="https://cdn-icons-png.flaticon.com/512/7603/7603406.png" alt="Sticker" class="w-20 h-20 mx-auto mb-6">
            <h2 class="text-2xl font-extrabold text-gray-800 mb-2">Tentang Zee App</h2>
            <p class="text-gray-600 text-sm mb-6 leading-relaxed">Cari pasangan anda di Zee App. Privasi 100%.</p>
            <button onclick="closeModal()" class="w-full py-3 bg-gray-900 text-white rounded-2xl font-bold uppercase tracking-wider btn-interact">
                MENGERTI
            </button>
        </div>
    </div>

    <!-- Gambar p1.png dipastikan ada di folder yang sama -->
    <img src="p1.png" class="full-bg" alt="Background">
    <div class="overlay"></div>

    <div class="glass-card">
        <div class="mb-6 flex justify-center reveal delay-1">
            <img src="p2.png" alt="Logo" class="static-logo">
        </div>

        <h1 class="text-5xl font-love text-white mb-2 drop-shadow-md reveal delay-2">Zee App</h1>
        <p class="text-white/80 font-bold mb-10 text-[10px] tracking-[0.3em] uppercase reveal delay-2">Love Is Love</p>

        <div class="flex flex-col gap-5">
            <a href="index-login.html" class="block reveal delay-3">
                <button class="btn-shine btn-interact w-full py-4 rounded-2xl text-white font-black text-xl tracking-wide uppercase flex items-center justify-center">
                    LOGIN 
                    <img src="https://cdn-icons-png.flaticon.com/512/2250/2250207.png" class="btn-icon" alt="Login">
                </button>
            </a>

            <a href="index-create-akun.html" class="block reveal delay-4">
                <button class="btn-interact w-full py-4 rounded-2xl border-2 border-white/40 bg-white/5 text-white font-extrabold text-lg transition-all flex items-center justify-center">
                    CREATE ACCOUNT
                    <img src="https://cdn-icons-png.flaticon.com/512/3294/3294850.png" class="btn-icon" alt="Register">
                </button>
            </a>
        </div>
    </div>

    <div class="credit-text reveal delay-4">
        Copyright © 2026 ZEE APP. All rights reserved.
    </div>

    <script>
        function closeModal() {
            const modal = document.getElementById('infoModal');
            modal.style.opacity = '0';
            setTimeout(() => {
                modal.style.display = 'none';
            }, 400);
        }

        // Security
        document.addEventListener('contextmenu', e => e.preventDefault());
        document.onkeydown = function(e) {
            if(e.keyCode == 123 || (e.ctrlKey && e.shiftKey && [73, 67, 74].includes(e.keyCode)) || (e.ctrlKey && e.keyCode == 85)) return false;
        };
    </script>
</body>
</html>
